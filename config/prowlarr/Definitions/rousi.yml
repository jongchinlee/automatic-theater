---
id: rousi
name: Rousi
description: "Rousi is a CHINESE Private Torrent Tracker for MOVIES / TV / GENERAL"
language: en-US
type: private
encoding: UTF-8
requestDelay: 2
links:
  - https://rousi.zip/

caps:
  categorymappings:
    - {id: 401, cat: Movies, desc: "Movies(Movies)", default: true}
    - {id: 402, cat: TV, desc: "TV Series(TV Series)", default: true}
    - {id: 403, cat: TV, desc: "TV Shows(TV Shows)", default: true}
    - {id: 404, cat: TV/Documentary, desc: "Documentaries(Documentary)", default: true}
    - {id: 407, cat: TV/Sport, desc: "Sports(Sports、English、English)", default: true}
    - {id: 410, cat: Console, desc: "Games(GamesEnglish)", default: true}
    - {id: 406, cat: Audio, desc: "Music(Music、English、MV、English)", default: true}
    - {id: 419, cat: TV, desc: "Art(English、English、English、English、English)", default: true}
    - {id: 411, cat: Other, desc: "Science(English、English、English)", default: true}
    - {id: 412, cat: Other, desc: "School(English、English、English)", default: true}
    - {id: 413, cat: Books, desc: "Book(English、English、English、Audiobooks)", default: true}
    - {id: 414, cat: Other, desc: "Code(ITEnglish、English、English、English、English、English)", default: true}
    - {id: 405, cat: TV/Anime, desc: "Animations(3DAnime、2.5English)", default: true}
    - {id: 415, cat: Other, desc: "ACGN(English、Manga、Anime)", default: true}
    - {id: 416, cat: Other, desc: "Baby(English、English、English、English)", default: true}
    - {id: 417, cat: Other, desc: "Resource(English、English、English、English)", default: true}
    - {id: 418, cat: PC, desc: "Software(Software、English、English、APPEnglish)", default: true}
    - {id: 409, cat: Other, desc: "Other(English，English)", default: true}
    # special
    - {id: 420, cat: XXX, desc: "English(English)", default: false}
    - {id: 421, cat: XXX, desc: "English(English)", default: false}
    - {id: 422, cat: XXX, desc: "III(English、EnglishMovies)", default: false}
    - {id: 423, cat: XXX, desc: "HEnglish(Anime、Manga)", default: false}
    - {id: 424, cat: XXX, desc: "HEnglish(GamesEnglish)", default: false}
    - {id: 425, cat: XXX, desc: "HEnglish(English、Audiobooks)", default: false}
    - {id: 426, cat: XXX, desc: "HEnglish(Photo Set、English、English、English)", default: false}
    - {id: 427, cat: XXX, desc: "HEnglish(ASMR、Audio、Music)", default: false}
    - {id: 428, cat: XXX, desc: "HEnglish(TV Shows、English、English、English)", default: false}
    - {id: 429, cat: XXX, desc: "HEnglish(English、English)", default: false}

  modes:
    search: [q]
    tv-search: [q, season, ep, imdbid, doubanid]
    movie-search: [q, imdbid, doubanid]
    music-search: [q]
    book-search: [q]

settings:
  - name: username
    type: text
    label: Username
  - name: password
    type: password
    label: Password
  - name: 2facode
    type: text
    label: 2FA code
  - name: info_2fa
    type: info
    label: "About 2FA code"
    default: "Only fill in the <b>2FA code</b> box if you have enabled <b>2FA</b> on the Rousi Web Site. Otherwise just leave it empty."
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false
  - name: sort
    type: select
    label: Sort requested from site
    default: 4
    options:
      4: created
      7: seeders
      5: size
      1: title
  - name: type
    type: select
    label: Order requested from site
    default: desc
    options:
      desc: desc
      asc: asc
  - name: info_tpp
    type: info
    label: Results Per Page
    default: For best results, change the <b>Torrents per page:</b> setting to <b>100</b> on your account profile.
  - name: info_special
    type: info
    label: "About the Special area (3X)"
    default: "Note that the <b>Special area</b> (3X) is only available to ranks <b>Power User</b> and <b>above</b>. If you are a <i>Peasant</i> or <i>User</i> then a search for <i>3X</i> torrents will return <b>0</b> results."

login:
  path: login.php
  method: form
  form: form[action="takelogin.php"]
  captcha:
    type: image
    selector: img[alt="CAPTCHA"]
    input: imagestring
  inputs:
    secret: ""
    username: "{{ .Config.username }}"
    password: "{{ .Config.password }}"
    two_step_code: "{{ .Config.2facode }}"
    logout: ""
    securelogin: ""
    ssl: yes
    trackerssl: yes
  error:
    - selector: td.embedded:has(h2:contains("Failed"))
  test:
    path: index.php
    selector: a[href="logout.php"]

search:
  paths:
    - path: torrents.php
      categories: [401, 402, 403, 404, 407, 410, 406, 419, 411, 412, 413, 414, 405, 415, 416, 417, 418, 409]
    - path: special.php
      categories: [420, 421, 422, 423, 424, 425, 426, 427, 428, 429]
  inputs:
    $raw: "{{ range .Categories }}cat{{.}}=1&{{end}}"
    search: "{{ if .Query.IMDBID }}{{ .Query.IMDBID }}{{ else }}{{ end }}{{ if or .Query.IMDBID .Query.DoubanID }} {{ else }}{{ .Keywords }}{{ end }}{{ if .Query.DoubanID }}{{ .Query.DoubanID }}{{ else }}{{ end }}"
    # 0 incldead, 1 active, 2 dead
    incldead: 0
    # 0 all, 1 normal, 2 free, 3 2x, 4 2xfree, 5 50%, 6 2x50%, 7 30%
    spstate: "{{ if .Config.freeleech }}2{{ else }}0{{ end }}"
    # 0 title, 1 descr, 3 uploader, 4 imdburl
    search_area: "{{ if .Query.IMDBID }}4{{ else }}{{ end }}{{ if .Query.DoubanID }}1{{ else }}{{ end }}{{ if or .Query.IMDBID .Query.DoubanID }}{{ else }}0{{ end }}"
    # 0 AND, 2 exact
    search_mode: 0
    sort: "{{ .Config.sort }}"
    type: "{{ .Config.type }}"
    notnewword: 1

  rows:
    selector: table.torrents > tbody > tr:has(a[href^="download.php?id="])

  fields:
    category:
      selector: a[href^="?cat="]
      attribute: href
      filters:
        - name: querystring
          args: cat
    title_default:
      selector: a[href^="details.php?id="]
    title:
      selector: a[title][href^="details.php?id="]
      attribute: title
      optional: true
      default: "{{ .Result.title_default }}"
    details:
      selector: a[href^="details.php?id="]
      attribute: href
    download:
      selector: a[href^="download.php?id="]
      attribute: href
    poster:
      selector: img[data-src]
      attribute: data-src
    imdbid:
      # site currently only has a badge and rating, the id is not present. just in case a future update.
      selector: a[href*="imdb.com/title/tt"]
      attribute: href
    doubanid:
      # site currently only has a badge and rating, the id is not present. just in case a future update.
      selector: a[href*="movie.douban.com/subject/"]
      attribute: href
    date_elapsed:
      # time type: time elapsed (default)
      selector: td.rowfollow:nth-child(4) > span[title]
      attribute: title
      optional: true
      filters:
        - name: append
          args: " +08:00" # CST
        - name: dateparse
          args: "yyyy-MM-dd HH:mm:ss zzz"
    date_added:
      # time added
      selector: td.rowfollow:nth-child(4):not(:has(span))
      optional: true
      filters:
        - name: append
          args: " +08:00" # CST
        - name: dateparse
          args: "yyyy-MM-ddHH:mm:ss zzz"
    date:
      text: "{{ if or .Result.date_elapsed .Result.date_added }}{{ or .Result.date_elapsed .Result.date_added }}{{ else }}now{{ end }}"
    size:
      selector: td.rowfollow:nth-child(5)
    seeders:
      selector: td.rowfollow:nth-child(6)
    leechers:
      selector: td.rowfollow:nth-child(7)
    grabs:
      selector: td.rowfollow:nth-child(8)
    downloadvolumefactor:
      case:
        img.pro_free: 0
        img.pro_free2up: 0
        img.pro_50pctdown: 0.5
        img.pro_50pctdown2up: 0.5
        img.pro_30pctdown: 0.3
        "*": 1
    uploadvolumefactor:
      case:
        img.pro_50pctdown2up: 2
        img.pro_free2up: 2
        img.pro_2up: 2
        "*": 1
    description_verified:
      case:
        span[title="Allowed"], span[title="Allowed"], span[title="Allowed"]: "Verified:"
        span[title="Not reviewed"], span[title="Not reviewed"], span[title="Not reviewed"]: "Unverified:"
        span[title="English"], span[title="English"], span[title="Denied"]: "Banned:"
    description:
      selector: td:nth-child(2)
      remove: a, b, font, img, span
      filters:
        - name: prepend
          args: "{{ .Result.description_verified }} "
# NexusPHP v1.8.8 2023-09-25
