---
id: torrentland
name: Torrentland
description: "Torrentland is a SPANISH Private Torrent Tracker for MOVIES / TV / GENERAL"
language: es-ES
type: private
encoding: UTF-8
links:
  - https://torrentland.li/

caps:
  categorymappings:
    - {id: 1, cat: Movies, desc: "PelГ­culas"}
    - {id: 2, cat: TV, desc: "Series"}
    - {id: 3, cat: TV/Anime, desc: "AnimaciГіn"}
    - {id: 4, cat: TV/Anime, desc: "Series AnimaciГіn"}
    - {id: 5, cat: TV/Documentary, desc: "Documentales"}
    - {id: 6, cat: TV/Documentary, desc: "Series Documentales"}
    - {id: 7, cat: TV/Sport, desc: "Deportes"}
    - {id: 8, cat: Audio/Video, desc: "Videos MГғsicales"}
    - {id: 9, cat: XXX, desc: "+18"}
    - {id: 10, cat: Other, desc: "Otros"}

  modes:
    search: [q]
    tv-search: [q, season, ep, imdbid, tvdbid, tmdbid]
    movie-search: [q, imdbid, tmdbid]
    music-search: [q]
    book-search: [q]

settings:
  - name: username
    type: text
    label: Username
  - name: password
    type: password
    label: Password
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false
  - name: compatOld
    type: checkbox
    label: Improve Sonarr compatibility with the tracker's older season naming scheme by renaming Sxx to Txx in searches. Can cause results already using Sxx to not be found.
    default: false
  - name: sort
    type: select
    label: Sort requested from site
    default: created_at
    options:
      created_at: created
      seeders: seeders
      size: size
      name: title
  - name: type
    type: select
    label: Order requested from site
    default: desc
    options:
      desc: desc
      asc: asc

login:
  path: login
  method: form
  form: form[action$="/login"]
  inputs:
    username: "{{ .Config.username }}"
    password: "{{ .Config.password }}"
    remember: on
  selectorinputs:
    _token:
      selector: input[name="_token"]
      attribute: value
  error:
    - selector: div#ERROR_COPY
#    test:
#      path: /
#      selector: a[href$="/logout"]

search:
  paths:
    # https://torrentland.li/torrents?
    # name=&description=&mediainfo=&uploader=&keywords=&tmdbId=&imdbId=&tvdbId=&malId=
    # &startYear=&endYear=&playlistId=&collectionId=&categories[]=1&perPage=100&free[0]=100
    - path: torrents

  inputs:
    $raw: "{{ range .Categories }}categories[]={{.}}&{{end}}"
    name: "{{ if .Query.IMDBID }}{{ else }}{{ .Keywords }}{{ end }}" # for dashboard imdbid search
    tmdbId: "{{ .Query.TMDBID }}"
    imdbId: "{{ .Query.IMDBIDShort }}"
    tvdbId: "{{ .Query.TVDBID }}"
    "free[0]": "{{ if .Config.freeleech }}100{{ else }}{{ end }}"
    sortField: "{{ .Config.sort }}"
    sortDirection: "{{ .Config.type }}"
    perPage: 100
    page: 1
    # supports genre search but you need to know the id, example genres=28 for AcciГіn

  keywordsfilters:
    - name: re_replace
      args: ["(?i)\\bS(\\d+)", "{{ if .Config.compatOld }}T$1{{ else }}S$1{{ end }}"]

  rows:
    # pre-release/vip torrents don't have download link
    selector: table > tbody > tr:has(a[href*="/download/"])

  fields:
    categorydesc:
      selector: span[data-original-title="Categoria"]
      optional: true
      default: Otros
    title_vose:
      selector: a.view-torrent:contains("VOSE")
      optional: true
      filters:
        - name: append
          args: " ENGLiSH"
    title_notvose:
      selector: a.view-torrent:not(:contains("VOSE"))
      optional: true
      filters:
        - name: append
          args: " SPANiSH"
    title:
      text: "{{ if .Result.title_vose }}{{ .Result.title_vose }}{{ else }}{{ .Result.title_notvose }}{{ end }}"
      filters:
        - name: re_replace
          args: ["^ *\\[[^\\]]*\\] *", ""] # Remove prefix tags
        - name: re_replace
          args: ["(?i)\\bT(\\d+)", "S$1"]
        - name: re_replace
          args: ["UHDRip", "BDRip"] # Fix for Radarr
    details:
      selector: a.view-torrent
      attribute: href
    download:
      selector: a[href*="/torrents/download/"]
      attribute: href
    poster:
      selector: div.torrent-poster img
      attribute: src
      filters:
        - name: replace
          args: ["https://via.placeholder.com/90x135", ""]
    imdbid:
      selector: div#imdb_id
    size:
      selector: td.torrent-listings-size
    seeders:
      selector: td.torrent-listings-seeders
    leechers:
      selector: td.torrent-listings-leechers
    grabs:
      selector: td.torrent-listings-completed
    date:
      selector: td.torrent-listings-age
      filters:
        # translations for Turkish|Estonian|Danish|Italian|Polish|Norwegian|Portuguese|Czech|Russian|Romanian|Spanish|French|German|Bulgarian|Dutch|Chinese|Japanese|Swedish
        - name: re_replace
          args: ["(?i)(Г¶nce|tagasi|geleden|fa|temu|siden|hГҰ|atrГҰs|nazpД›t|РҢР°Р·Р°Рө|acum|Г®n urmДѓ|hace|il y a|vor|РүСЂРµРөРё|English|sedan)", " ago"]
        - name: re_replace
          args: ["(?i)(saniye|sekundit|sekunder|secondi|sekund|segundos|sekundami|СЃРµРғСѓРҢРө|secunde|secondes|Sekunden|СЃРµРғСѓРҢРөРё|seconden|seconds ago)", "seconds"]
        - name: re_replace
          args: ["(?i)(minutit|minutter|minuti|minuty|minutos|РәРёРҢСѓС‚С‹|РәРёРҢСѓС‚|Minuten|РәРёРҢСѓС‚Рё|minuten|minuter)", "minutes"]
        - name: re_replace
          args: ["(?i)(dakika|minut|minuto|minuta|minutt|РәРёРҢСѓС‚Р°|Minute|minuut|minutes|English)", " minute"]
        - name: re_replace
          args: ["(?i)(tundi|timer|ore|godziny|horas|hodiny|hoden|С‡Р°СЃР°|С‡Р°СЃРңРІ|ore|heures|Stunden|timmar)", "hours"]
        - name: re_replace
          args: ["(?i)(saat|tund|time|ora|godzina|hora|hodina|С‡Р°СЃ|orДѓ|heure|Stunde|uur|English|English|timme)", " hour"]
        - name: re_replace
          args: ["(?i)(pГ¤eva|dage|giorni|dni|dias|dny|РөРҢСЏ|РөРҢРµР№|zile|dГ­as|jours|Tagen|РөРҢРё|dagen|dagar)", "days"]
        - name: re_replace
          args: ["(?i)(gГәn|pГ¤ev|dag|giorno|dzieЕ„|dia|den|РөРµРҢСЊ|zi|dГ­a|jour|Tag|РөРµРҢ|English|English)", " day"]
        - name: re_replace
          args: ["(?i)(nГ¤dalat|uger|settimane|tygodnie|uker|semanas|tГҢdny|РҢРµРөРµР»Рё|РҢРµРөРµР»СЊ|sДѓptДѓmГұni|semaines|Wochen|СЃРµРөРәРёС†Рё|weken|veckor)", "weeks"]
        - name: re_replace
          args: ["(?i)(hafta|nГ¤dal|uge|settimana|tydzieЕ„|uke|semana|tГҢden|РҢРµРөРµР»СҺ|sДѓptДѓmГұnДѓ|semaine|Woche|СЃРµРөРәРёС†Р°|English|English|vecka)", " week"]
        - name: re_replace
          args: ["(?i) (ay)", "month"]
        - name: re_replace
          args: ["(?i)(kuud|mГӨneder|mesi|miesiД…ce|meses|mД›sГ­ce|РәРµСЃСЏС†Р°|РәРµСЃСЏС†РµРІ|luni|meses|mois|Monaten|РәРµСЃРµС†Р°|maanden|mГӨnader)", "months"]
        - name: re_replace
          args: ["(?i)(kuu|mГӨned|mese|miesiД…c|mГҒs|mД›sГ­c|РәРµСЃСЏС†|lunДѓ|mes|Monat|РәРµСЃРµС†|maand|English|гѓ¶English|mГӨnad)", " month"]
        - name: re_replace
          args: ["(?i)(aastat|anni|lata|anos|roky|РіРңРөР°|ani|aГ±os|ans|Jahren|РіРңРөРёРҢРё)", " years"]
        - name: re_replace
          args: ["(?i)(yil|aasta|ГӨr|anno|rok|ano|РіРңРө|aГ±o|Jahr|РіРңРөРёРҢР°|jaar|English)", " year"]
        - name: re_replace
          args: ["(?i) (an)", "year"]
        - name: re_replace
          args: ["(?i)(FГ¶r |und)", ""] # Misc removals
        - name: timeago
    downloadvolumefactor:
      case:
        i[class*="fa-id-badge text-orange"]: 0 # 24 Hour FreeLeech From BON Store
        i[class*="fa-trophy text-purple"]: 0 # Special FreeLeech For Certain User Groups
        i[class*="fa-star text-bold"]: 0 # Freeleech From Token
        i[class*="fa-coins text-bold"]: 0 # Freeleech From Token
        i[class*="fa-globe text-blue"]: 0 # Global Freeleech
        i[class*="fa-star text-gold"]: 0 # Freeleech
        i[class*="fa-certificate text-pink"]: 0 # Featured Torrent
        "*": 1
    uploadvolumefactor:
      case:
        i[class*="fa-gem text-green"]: 2 # Single Torrent Double Upload
        i[class*="fa-globe text-green"]: 2 # Global Double Upload
        i[class*="fa-certificate text-pink"]: 2 # Featured Torrent
        "*": 1
# global MR is 0.4 but torrents must be seeded for 4 days regardless of ratio
#    minimumratio:
#      text: 0.4
    minimumseedtime:
      # 4 days (as seconds = 4 x 24 x 60 x 60)
      text: 345600
# UNIT3D 6.5.0 (custom)
