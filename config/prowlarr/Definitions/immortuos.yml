---
id: immortuos
name: Immortuos
description: "Immortuos is a GERMAN Private Tracker for MOVIES / TV"
language: de-DE
type: private
encoding: UTF-8
links:
  - https://immortuos.life/
legacylinks:
  - https://www.immortuos.life/

caps:
  categorymappings:
    - {id: 1, cat: Movies, desc: "Movies"}
    - {id: 2, cat: TV, desc: "TV"}
    - {id: 3, cat: Audio, desc: "Music"}
    - {id: 4, cat: PC, desc: "Apps"}
    - {id: 5, cat: XXX, desc: "XXX"}
    - {id: 6, cat: TV/Documentary, desc: "Doku"}
    - {id: 7, cat: Console, desc: "Games"}
    - {id: 8, cat: Other, desc: "Sonstiges"}
    - {id: 9, cat: Movies, desc: "Kino"}

  modes:
    search: [q]
    tv-search: [q, season, ep, imdbid, tvdbid, tmdbid]
    movie-search: [q, imdbid, tmdbid]
    music-search: [q]

settings:
  - name: username
    type: text
    label: Username
  - name: password
    type: password
    label: Password
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false
  - name: sort
    type: select
    label: Sort requested from site
    default: created_at
    options:
      created_at: created
      seeders: seeders
      size: size
      name: title
  - name: type
    type: select
    label: Order requested from site
    default: desc
    options:
      desc: desc
      asc: asc

login:
  path: login
  method: form
  form: form[action$="/login"]
  inputs:
    username: "{{ .Config.username }}"
    password: "{{ .Config.password }}"
    remember: on
  selectorinputs:
    _token:
      selector: input[name="_token"]
      attribute: value
  error:
    - selector: script[nonce]:contains("Error")
      message:
        selector: script[nonce]:contains("Error")
#    test:
#      path: /
#      selector: a[href$="/logout"]

search:
  paths:
    - path: filterTorrents
  inputs:
    $raw: "{{ range .Categories }}categories[]={{.}}&{{end}}"
    search: "{{ if .Query.IMDBID }}{{ else }}{{ .Keywords }}{{ end }}" # for dashboard imdbid search
    imdb: "{{ .Query.IMDBIDShort }}"
    tvdb: "{{ .Query.TVDBID }}"
    tmdb: "{{ .Query.TMDBID }}"
    sorting: "{{ .Config.sort }}"
    direction: "{{ .Config.type }}"
    qty: 100
    page: 0
    view: list
    freeleech: "{{ if .Config.freeleech }}1{{ else }}{{ end }}"
    # can search by genre but need range support. &genres%5B%5D=Action&genres%5B%5D=Comedy for Action and Comedy

  rows:
    selector: table > tbody > tr

  fields:
    category:
      selector: a[href*="/categories/"]
      attribute: href
      filters:
        - name: regexp
          args: "/categories/.*?\\.(\\d+)"
    title:
      selector: a.view-torrent
    download:
      selector: a[href*="/download/"]
      attribute: href
    details:
      selector: a.view-torrent
      attribute: href
    poster:
      selector: div.torrent-poster img
      attribute: src
      filters:
        - name: prepend
          args: "https://images.weserv.nl/?url=" # for display on dashboard
        - name: append
          args: "&w=180&h=270" # for display on dashboard
        - name: replace
          args: ["https://images.weserv.nl/?url=https://via.placeholder.com/600x900&w=180&h=270", ""]
    genre:
      selector: td:nth-last-child(6)
      filters:
        - name: replace
          args: ["\n", ""]
        - name: re_replace
          args: ["(?i)(Science Fiction)", "Science_Fiction"]
        - name: validate
          args: "Action, Adventure, Animation, Biography, Comedy, Crime, Documentary, Drama, Family, Fantasy, Game-Show, History, Horror, Music, Musical, Mystery, News, Reality-TV, Romance, Science_Fiction, Sitcom, Sport, Talk-Show, Thriller, War, Western"
    description:
      text: "{{ .Result.genre }}"
    size:
      selector: td:nth-last-child(4)
    seeders:
      selector: td:nth-last-child(3)
    leechers:
      selector: td:nth-last-child(2)
    grabs:
      selector: td:nth-last-child(1)
    imdbid:
      selector: a[href*="imdb.com/title/tt"]
      attribute: href
    tmdbid:
      selector: a[href*="themoviedb.org/movie/"], a[href*="themoviedb.org/tv/"]
      attribute: href
    date:
      selector: time
      filters:
        # translations for Turkish|Estonian|Danish|Italian|Polish|Norwegian|Portuguese|Czech|Russian|Romanian|Spanish|French|German|Bulgarian|Dutch|Chinese|Japanese|Swedish
        - name: re_replace
          args: ["(?i)(√∂nce|tagasi|geleden|fa|temu|siden|h√°|atr√°s|nazpƒõt|–Ω–∞–∑–∞–¥|acum|√Æn urmƒÉ|hace|il y a|vor|–ø—Ä–µ–¥–∏|English|sedan)", " ago"]
        - name: re_replace
          args: ["(?i)(saniye|sekundit|sekunder|secondi|sekund|segundos|sekundami|—Å–µ–∫—É–Ω–¥|secunde|secondes|Sekunden|—Å–µ–∫—É–Ω–¥–∏|seconden|seconds ago)", "seconds"]
        - name: re_replace
          args: ["(?i)(minutit|minutter|minuti|minuty|minutos|–º–∏–Ω—É—Ç—ã|–º–∏–Ω—É—Ç|Minuten|–º–∏–Ω—É—Ç–∏|minuten|minuter)", "minutes"]
        - name: re_replace
          args: ["(?i)(dakika|minut|minuto|minuta|minutt|–º–∏–Ω—É—Ç–∞|Minute|minuut|minutes|English)", " minute"]
        - name: re_replace
          args: ["(?i)(tundi|timer|ore|godziny|horas|hodiny|hoden|—á–∞—Å–∞|—á–∞—Å–æ–≤|ore|heures|Stunden|timmar)", "hours"]
        - name: re_replace
          args: ["(?i)(saat|tund|time|ora|godzina|hora|hodina|—á–∞—Å|orƒÉ|heure|Stunde|uur|English|English|timme)", " hour"]
        - name: re_replace
          args: ["(?i)(p√§eva|dage|giorni|dni|dias|dny|–¥–Ω—è|–¥–Ω–µ–π|zile|d√≠as|jours|Tagen|–¥–Ω–∏|dagen|dagar)", "days"]
        - name: re_replace
          args: ["(?i)(g√ºn|p√§ev|dag|giorno|dzie≈Ñ|dia|den|–¥–µ–Ω—å|zi|d√≠a|jour|Tag|–¥–µ–Ω|English|English)", " day"]
        - name: re_replace
          args: ["(?i)(n√§dalat|uger|settimane|tygodnie|uker|semanas|t√Ωdny|–Ω–µ–¥–µ–ª–∏|–Ω–µ–¥–µ–ª—å|sƒÉptƒÉm√¢ni|semaines|Wochen|—Å–µ–¥–º–∏—Ü–∏|weken|veckor)", "weeks"]
        - name: re_replace
          args: ["(?i)(hafta|n√§dal|uge|settimana|tydzie≈Ñ|uke|semana|t√Ωden|–Ω–µ–¥–µ–ª—é|sƒÉptƒÉm√¢nƒÉ|semaine|Woche|—Å–µ–¥–º–∏—Ü–∞|English|English|vecka)", " week"]
        - name: re_replace
          args: ["(?i) (ay)", "month"]
        - name: re_replace
          args: ["(?i)(kuud|m√•neder|mesi|miesiƒÖce|meses|mƒõs√≠ce|–º–µ—Å—è—Ü–∞|–º–µ—Å—è—Ü–µ–≤|luni|meses|mois|Monaten|–º–µ—Å–µ—Ü–∞|maanden|m√•nader)", "months"]
        - name: re_replace
          args: ["(?i)(kuu|m√•ned|mese|miesiƒÖc|m√™s|mƒõs√≠c|–º–µ—Å—è—Ü|lunƒÉ|mes|Monat|–º–µ—Å–µ—Ü|maand|English|„É∂English|m√•nad)", " month"]
        - name: re_replace
          args: ["(?i)(aastat|anni|lata|anos|roky|–≥–æ–¥–∞|ani|a√±os|ans|Jahren|–≥–æ–¥–∏–Ω–∏)", " years"]
        - name: re_replace
          args: ["(?i)(yil|aasta|√•r|anno|rok|ano|–≥–æ–¥|a√±o|Jahr|–≥–æ–¥–∏–Ω–∞|jaar|English)", " year"]
        - name: re_replace
          args: ["(?i) (an)", "year"]
        - name: re_replace
          args: ["(?i)(F√∂r |und)", ""] # Misc removals
        - name: timeago
    downloadvolumefactor:
      case:
        i[class*="fa-id-badge text-orange"]: 0 # 24 Hour FreeLeech From BON Store
        i[class*="fa-trophy text-purple"]: 0 # Special FreeLeech For Certain User Groups
        i[class*="fa-star text-bold"]: 0 # Freeleech From Token
        i[class*="fa-coins text-bold"]: 0 # Freeleech From Token
        i[class*="fa-globe text-blue"]: 0 # Global Freeleech
        i[class*="fa-star text-gold"]: 0 # Freeleech
        i[class*="fa-certificate text-pink"]: 0 # Featured Torrent
        "*": 1
    uploadvolumefactor:
      case:
        i[class*="fa-gem text-green"]: 2 # Single Torrent Double Upload
        i[class*="fa-globe text-green"]: 2 # Global Double Upload
        i[class*="fa-certificate text-pink"]: 2 # Featured Torrent
        "*": 1
# global MR is 1.0 but torrents must be seeded for 2 days regardless of ratio
#    minimumratio:
#      text: 1.0
    minimumseedtime:
      # 2 days (as seconds = 5 x 24 x 60 x 60)
      text: 172800
