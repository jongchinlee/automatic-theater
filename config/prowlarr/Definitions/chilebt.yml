---
id: chilebt
name: ChileBT
description: "ChileBT is a CHILEAN Private Torrent Tracker for MOVIES / TV / GENERAL"
language: es-CL
type: private
encoding: UTF-8
links:
  - https://chilebt.com/

caps:
  categorymappings:
    - {id: 10, cat: Movies, desc: "Movies"}
    - {id: 11, cat: TV, desc: "TV"}
    - {id: 9, cat: Audio, desc: "Music"}
    - {id: 7, cat: Other, desc: "Cultura / Educativos"}
    - {id: 8, cat: PC/Games, desc: "Juegos"}
    - {id: 6, cat: Books, desc: "EBook"}
    - {id: 4, cat: TV/Anime, desc: "Anime"}
    - {id: 5, cat: PC/0day, desc: "Aplicaciones / Programas"}
    - {id: 14, cat: Movies, desc: "Infantil"}
    - {id: 12, cat: Other/Misc, desc: "VIP"}
    - {id: 13, cat: XXX, desc: "XXX"}

  modes:
    search: [q]
    tv-search: [q, season, ep, imdbid, tvdbid, tmdbid]
    movie-search: [q, imdbid, tmdbid]
    music-search: [q]
    book-search: [q]

settings:
  - name: username
    type: text
    label: Username
  - name: password
    type: password
    label: Password
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false
  - name: sort
    type: select
    label: Sort requested from site
    default: created_at
    options:
      created_at: created
      seeders: seeders
      size: size
      name: title
  - name: type
    type: select
    label: Order requested from site
    default: desc
    options:
      desc: desc
      asc: asc

login:
  path: login
  method: form
  form: form[action$="/login"]
  inputs:
    username: "{{ .Config.username }}"
    password: "{{ .Config.password }}"
    remember: on
  selectorinputs:
    _token:
      selector: input[name="_token"]
      attribute: value
  error:
    - selector: script[nonce]:contains("Error")
      message:
        selector: script[nonce]:contains("Error")
#    test:
#      path: /
#      selector: a[href$="/logout"]

search:
  paths:
    - path: filterTorrents
  inputs:
    $raw: "{{ range .Categories }}categories[]={{.}}&{{end}}"
    search: "{{ if .Query.IMDBID }}{{ else }}{{ .Keywords }}{{ end }}" # for dashboard imdbid search
    imdb: "{{ .Query.IMDBIDShort }}"
    tvdb: "{{ .Query.TVDBID }}"
    tmdb: "{{ .Query.TMDBID }}"
    sorting: "{{ .Config.sort }}"
    direction: "{{ .Config.type }}"
    qty: 50
    page: 0
    view: list
    freeleech: "{{ if .Config.freeleech }}1{{ else }}{{ end }}"
    # can search by genre but need range support. &genres[]=Action&genres[]=Comedy for Action and Comedy

  rows:
    selector: table > tbody > tr

  fields:
    category:
      selector: a[href*="/categories/"]
      attribute: href
      filters:
        - name: regexp
          args: "/categories/.*?\\.(\\d+)"
    title:
      selector: a.view-torrent
    download:
      selector: a[href*="/download/"]
      attribute: href
    details:
      selector: a.view-torrent
      attribute: href
    poster:
      selector: div.torrent-poster img
      attribute: src
      filters:
        - name: prepend
          args: "https://images.weserv.nl/?url=" # for display on dashboard
        - name: append
          args: "&w=180&h=270" # for display on dashboard
        - name: replace
          args: ["https://images.weserv.nl/?url=https://via.placeholder.com/600x900&w=180&h=270", ""]
    genre:
      selector: td:nth-last-child(6)
      filters:
        - name: replace
          args: ["\n", ""]
        - name: re_replace
          args: ["(?i)(Science Fiction)", "Science_Fiction"]
        - name: validate
          args: "Action, Adventure, Animation, Biography, Comedy, Crime, Documentary, Drama, Family, Fantasy, Game-Show, History, Horror, Music, Musical, Mystery, News, Reality-TV, Romance, Science_Fiction, Sitcom, Sport, Talk-Show, Thriller, War, Western"
    description:
      text: "{{ .Result.genre }}"
    size:
      selector: td:nth-last-child(4)
    seeders:
      selector: td:nth-last-child(3)
    leechers:
      selector: td:nth-last-child(2)
    grabs:
      selector: td:nth-last-child(1)
    imdbid:
      selector: a[href*="imdb.com/title/tt"]
      attribute: href
    tmdbid:
      selector: a[href*="themoviedb.org/movie/"], a[href*="themoviedb.org/tv/"]
      attribute: href
    date:
      selector: time
      filters:
        # translations for Turkish|Estonian|Danish|Italian|Polish|Norwegian|Portuguese|Czech|Russian|Romanian|Spanish|French|German|Bulgarian|Dutch|Chinese|Japanese|Swedish
        - name: re_replace
          args: ["(?i)(枚nce|tagasi|geleden|fa|temu|siden|h谩|atr谩s|nazp臎t|薪邪蟹邪写|acum|卯n urm膬|hace|il y a|vor|锌褉械写懈|English|sedan)", " ago"]
        - name: re_replace
          args: ["(?i)(saniye|sekundit|sekunder|secondi|sekund|segundos|sekundami|褋械泻褍薪写|secunde|secondes|Sekunden|褋械泻褍薪写懈|seconden|seconds ago)", "seconds"]
        - name: re_replace
          args: ["(?i)(minutit|minutter|minuti|minuty|minutos|屑懈薪褍褌褘|屑懈薪褍褌|Minuten|屑懈薪褍褌懈|minuten|minuter)", "minutes"]
        - name: re_replace
          args: ["(?i)(dakika|minut|minuto|minuta|minutt|屑懈薪褍褌邪|Minute|minuut|minutes|English)", " minute"]
        - name: re_replace
          args: ["(?i)(tundi|timer|ore|godziny|horas|hodiny|hoden|褔邪褋邪|褔邪褋芯胁|ore|heures|Stunden|timmar)", "hours"]
        - name: re_replace
          args: ["(?i)(saat|tund|time|ora|godzina|hora|hodina|褔邪褋|or膬|heure|Stunde|uur|English|English|timme)", " hour"]
        - name: re_replace
          args: ["(?i)(p盲eva|dage|giorni|dni|dias|dny|写薪褟|写薪械泄|zile|d铆as|jours|Tagen|写薪懈|dagen|dagar)", "days"]
        - name: re_replace
          args: ["(?i)(g眉n|p盲ev|dag|giorno|dzie艅|dia|den|写械薪褜|zi|d铆a|jour|Tag|写械薪|English|English)", " day"]
        - name: re_replace
          args: ["(?i)(n盲dalat|uger|settimane|tygodnie|uker|semanas|t媒dny|薪械写械谢懈|薪械写械谢褜|s膬pt膬m芒ni|semaines|Wochen|褋械写屑懈褑懈|weken|veckor)", "weeks"]
        - name: re_replace
          args: ["(?i)(hafta|n盲dal|uge|settimana|tydzie艅|uke|semana|t媒den|薪械写械谢褞|s膬pt膬m芒n膬|semaine|Woche|褋械写屑懈褑邪|English|English|vecka)", " week"]
        - name: re_replace
          args: ["(?i) (ay)", "month"]
        - name: re_replace
          args: ["(?i)(kuud|m氓neder|mesi|miesi膮ce|meses|m臎s铆ce|屑械褋褟褑邪|屑械褋褟褑械胁|luni|meses|mois|Monaten|屑械褋械褑邪|maanden|m氓nader)", "months"]
        - name: re_replace
          args: ["(?i)(kuu|m氓ned|mese|miesi膮c|m锚s|m臎s铆c|屑械褋褟褑|lun膬|mes|Monat|屑械褋械褑|maand|English|銉禘nglish|m氓nad)", " month"]
        - name: re_replace
          args: ["(?i)(aastat|anni|lata|anos|roky|谐芯写邪|ani|a帽os|ans|Jahren|谐芯写懈薪懈)", " years"]
        - name: re_replace
          args: ["(?i)(yil|aasta|氓r|anno|rok|ano|谐芯写|a帽o|Jahr|谐芯写懈薪邪|jaar|English)", " year"]
        - name: re_replace
          args: ["(?i) (an)", "year"]
        - name: re_replace
          args: ["(?i)(F枚r |und)", ""] # Misc removals
        - name: timeago
    downloadvolumefactor:
      case:
        i[class*="fa-id-badge text-orange"]: 0 # 24 Hour FreeLeech From BON Store
        i[class*="fa-trophy text-purple"]: 0 # Special FreeLeech For Certain User Groups
        i[class*="fa-star text-bold"]: 0 # Freeleech From Token
        i[class*="fa-coins text-bold"]: 0 # Freeleech From Token
        i[class*="fa-globe text-blue"]: 0 # Global Freeleech
        i[class*="fa-star text-gold"]: 0 # Freeleech
        i[class*="fa-certificate text-pink"]: 0 # Featured Torrent
        "*": 1
    uploadvolumefactor:
      case:
        i[class*="fa-gem text-green"]: 2 # Single Torrent Double Upload
        i[class*="fa-globe text-green"]: 2 # Global Double Upload
        i[class*="fa-certificate text-pink"]: 2 # Featured Torrent
        "*": 1
# global MR is 0.5 but torrents must be seeded for 7 days regardless of ratio
#    minimumratio:
#      text: 0.5
    minimumseedtime:
      # 7 day (as seconds = 7 x 24 x 60 x 60)
      text: 604800
# UNIT3D 1.9.3
